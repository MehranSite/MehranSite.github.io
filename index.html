<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>M&M❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazir', 'Tahoma', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e;
            overflow: hidden; /* جلوگیری همیشگی از اسکرول دوتایی بادی */
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden; /* جلوگیری کامل از هرگونه بیرون‌زدگی افقی */
            padding: 20px;
            scroll-behavior: smooth;
        }
        .page.active {
            display: block;
        }

        /* افکت تاریک‌کننده پس‌زمینه ثابت برای پایداری ابعاد و خوانایی عالی */
        .page::before {
            content: '';
            position: fixed;
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background: rgba(15, 15, 30, 0.65);
            z-index: 1;
            pointer-events: none; /* عدم تداخل با کلیک‌ها */
        }

        .page-content-wrapper {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            max-width: 100%;
            padding-bottom: 50px;
        }

        #login-page {
            background-image: url('pic1.jpg');
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #login-page::before {
            background: rgba(0, 0, 0, 0.4);
        }
        #login-page:not(.active) {
            display: none;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 25px;
            background: rgba(45, 45, 74, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 2px solid #8e44ad;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            color: #fff;
        }

        #password-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid transparent;
            border-radius: 50px;
            font-size: 1.1rem;
            text-align: center;
            background: rgba(236, 240, 241, 0.9);
            outline: none;
            color: #2c3e50;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        #password-input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        #submit-btn {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            background-color: #ff6b6b;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(255,107,107,0.4);
        }

        #submit-btn:hover {
            background-color: #ff4757;
            transform: translateY(-2px);
        }

        .error-message {
            margin-top: 15px;
            color: #ff8a8a;
            font-size: 1rem;
            min-height: 25px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        #main-page {
            background-image: url('pic2.jpg');
            background-size: cover;
            justify-content: center;
            align-items: center;
            display: none;
        }
        #main-page.active {
            display: flex;
        }

        .boxes-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            z-index: 10;
            padding: 20px;
        }

        .box {
            flex: 1 1 280px;
            max-width: 320px;
            height: 250px;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: rgba(45, 45, 74, 0.85);
            backdrop-filter: blur(5px);
            border: 3px solid #9b59b6;
            padding: 20px;
        }

        .box:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 15px 35px rgba(155, 89, 182, 0.4);
            border-color: #f1c40f;
        }

        /* شخصی‌سازی باکس‌ها */
        .box[data-profile="mehran"] { border-color: #3498db; }
        .box[data-profile="public"] { border-color: #2ecc71; }
        .box[data-profile="melorin"] { border-color: #9b59b6; }

        /* استایل مدال‌های سفارشی و شیک */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 15px;
        }
        .modal.active { display: flex; }

        .modal-content {
            background: #2d2d4a;
            padding: 35px 25px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            direction: rtl;
            border: 3px solid #9b59b6;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
            animation: modalFade 0.3s ease-out;
        }

        @keyframes modalFade {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #f1c40f;
            font-size: 1.8rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .modal-content input[type="password"],
        .modal-content input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #9b59b6;
            border-radius: 50px;
            font-size: 1.1rem;
            text-align: center;
            background: #ecf0f1;
            color: #2c3e50;
            outline: none;
        }

        .modal-content button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            background: #9b59b6;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }
        .modal-content button:hover {
            transform: scale(1.05);
        }
        .modal-content button.cancel { background: #e74c3c; }

        .modal-error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 1rem;
            font-weight: bold;
        }

        .inner-page {
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* نمایش جذاب و ثابت تصویر زمینه */
            color: white;
        }

        #public-page { background-image: url('pic3.jpg'); }
        #mehran-page { background-image: url('pic5.jpg'); }
        #melorin-page { background-image: url('pic4.jpg'); }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(45, 45, 74, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-radius: 30px;
            margin-bottom: 30px;
            border: 2px solid #9b59b6;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            gap: 15px;
        }

        .page-header h2 {
            font-size: 1.8rem;
            margin: 0;
            color: #f1c40f;
            text-shadow: 0 0 8px rgba(241,196,15,0.4);
            text-align: center;
            flex-grow: 1;
        }

        .home-btn {
            background: #34495e;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #9b59b6;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .home-btn:hover {
            background: #1e272e;
            border-color: #f1c40f;
            transform: scale(1.05);
        }

        .public-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(45, 45, 74, 0.9);
            border-radius: 40px;
            padding: 30px;
            border: 2px solid #9b59b6;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* تراز کردن تایمر */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            direction: ltr;
            margin-bottom: 30px;
        }

        .timer-item {
            text-align: center;
            background: #1e1e3f;
            border-radius: 20px;
            padding: 15px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid #9b59b6;
        }

        .timer-label {
            font-size: 1.1rem;
            color: #f39c12;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .timer-value {
            font-size: 2.2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            background: #0f0f1f;
            padding: 8px;
            border-radius: 15px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .special-reason-box {
            background: #4a235a;
            border: 2px solid #9b59b6;
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            color: #f1c40f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .reason-item {
            background: #2c3e50;
            margin: 12px 0;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 1.1rem;
            border-right: 6px solid #ff6b6b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            color: white;
            line-height: 1.6;
            transition: all 0.3s;
        }
        .reason-item:hover {
            background: #34495e;
            transform: translateX(-5px);
        }

        /* شبکه سکشن‌های پروفایل اختصاصی - اصلاح ستون‌ها برای دسکتاپ */
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .section-card {
            background: rgba(45, 45, 74, 0.9);
            border-radius: 30px;
            padding: 22px;
            border: 2px solid;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0; /* حیاتی برای پیشگیری از اورفلو کارت‌های درونی گرید */
        }

        /* تخصیص رنگ های جذاب و متنوع برای کارت‌ها */
        .section-card:nth-child(4n+1) { border-color: #9b59b6; }
        .section-card:nth-child(4n+2) { border-color: #3498db; }
        .section-card:nth-child(4n+3) { border-color: #2ecc71; }
        .section-card:nth-child(4n+4) { border-color: #e67e22; }

        .section-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            color: #f1c40f;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .items-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 350px;
            overflow-y: auto;
            background: #1e1e3f;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* استایل سفارشی اسکرول بار */
        .items-container::-webkit-scrollbar {
            width: 6px;
        }
        .items-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .items-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        .item-card {
            background: #2c3e50;
            border-radius: 18px;
            padding: 15px;
            position: relative;
            border-right: 4px solid #ff6b6b;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .item-card:hover {
            background: #34495e;
        }

        .item-card img, .item-card video {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 10px;
            display: block;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .item-reason {
            font-size: 0.9rem;
            color: #ffbe76;
            margin-top: 8px;
            font-style: italic;
            background: #1a1a2e;
            padding: 6px 12px;
            border-radius: 15px;
            border-right: 2px solid #f1c40f;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 1px solid #c0392b;
            z-index: 5;
        }
        .delete-btn:hover {
            background: #c0392b;
            transform: scale(1.15);
        }

        .add-btn {
            background: rgba(52, 73, 94, 0.8);
            border: 2px dashed #9b59b6;
            color: white;
            padding: 12px;
            border-radius: 20px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .add-btn:hover {
            background: #4a6fa5;
            border-color: #f1c40f;
        }

        /* فرم‌ها */
        .add-form {
            background: #1e1e3f;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            border: 2px solid #9b59b6;
        }
        .add-form.active { display: block; }

        .add-form input, .add-form textarea, .add-form select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid transparent;
            border-radius: 15px;
            font-size: 0.95rem;
            background: #ecf0f1;
            color: #2c3e50;
            outline: none;
            transition: 0.3s;
        }
        .add-form input:focus, .add-form textarea:focus {
            border-color: #9b59b6;
        }

        .add-form label {
            font-size: 0.9rem;
            color: #f1c40f;
            margin-top: 5px;
            display: block;
        }

        .add-form button {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            background: #2ecc71;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            margin-left: 8px;
            border: 1px solid #27ae60;
            transition: 0.2s;
        }
        .add-form button:hover { transform: scale(1.05); }
        .add-form button.cancel { background: #e74c3c; border-color: #c0392b; }

        /* چت روم شخصی */
        .chat-message {
            background: #2980b9;
            border-radius: 18px;
            border-top-right-radius: 2px;
            padding: 10px 15px;
            margin: 8px 0;
            max-width: 85%;
            align-self: flex-start;
            position: relative;
            border: 1px solid #3498db;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .chat-message.own {
            background: #8e44ad;
            border-radius: 18px;
            border-top-left-radius: 2px;
            align-self: flex-end;
            border-color: #9b59b6;
        }
        .chat-sender {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 5px;
            color: #f1c40f;
            font-weight: bold;
        }
        .chat-delete {
            position: absolute;
            top: -6px;
            left: -6px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #c0392b;
            transition: 0.2s;
        }
        .chat-delete:hover { transform: scale(1.2); }

		.chat-input-area {
		    display: flex;
		    gap: 8px;
		    margin-top: 15px;
		    width: 100%;
		}
		.chat-input-area input {
		    flex: 1;
		    padding: 12px 15px;
		    border-radius: 50px;
		    border: 2px solid #9b59b6;
		    background: #ecf0f1;
		    color: #2c3e50;
		    outline: none;
		    font-size: 0.95rem;
		    min-width: 0; /* جلوگیری از بیرون زدگی اینپوت در موبایل */
		}	
		.chat-input-area button {
		    padding: 12px 20px;
		    border-radius: 50px;
		    border: none;
		    background: #f39c12;
		    color: white;
		    font-weight: bold;
		    cursor: pointer;
		    transition: all 0.3s;
		    border: 1px solid #e67e22;
		    white-space: nowrap; /* جلوگیری از شکستن متن دکمه */
		}		
		.chat-input-area button:hover {
		    background: #e67e22;
		    transform: scale(1.03);
		}

        .game-item {
            background: #2c3e50;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .game-item a {
            color: #f1c40f;
            text-decoration: none;
            font-weight: bold;
        }
        .game-item a:hover {
            text-decoration: underline;
        }

        .change-password {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: rgba(45, 45, 74, 0.85);
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px dashed #9b59b6;
            transition: all 0.3s;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .change-password:hover {
            background: #4a235a;
            border-color: #f1c40f;
            transform: translateY(-3px);
        }

        /* اصلاح هدر کارت اطلاعات شخصی */
        .info-card-pic {
            width: 110px;
            height: 110px;
            border-radius: 50% !important;
            object-fit: cover;
            margin: 0 auto 15px auto !important;
            border: 3px solid #f1c40f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* رسپانسیو و بهینه‌سازی شده برای موبایل */
        @media (max-width: 768px) {
            /* حذف لغو اسکرول بادی در موبایل برای رفع تداخل پهنای صفحه */
            .page {
                padding: 15px 12px; /* تنظیم پدینگ نرم برای صفحات موبایل */
            }
            h1 { font-size: 1.8rem; }
            .box { height: 180px; font-size: 1.3rem; }
            .page-header {
                flex-direction: column;
                padding: 15px;
                border-radius: 20px;
            }
            .page-header h2 { font-size: 1.3rem; }
            .home-btn { width: 100%; text-align: center; padding: 10px; }
            .timer-grid { gap: 8px; }
            .timer-value { font-size: 1.4rem; padding: 5px; }
            .timer-label { font-size: 0.9rem; }
            .section-title { font-size: 1.2rem; }
            .item-card { font-size: 0.95rem; padding: 12px; }
            .add-btn { font-size: 1rem; padding: 10px; }
            .sections-grid { 
                grid-template-columns: 1fr; /* تبدیل منعطف به تک ستونه روان بدون گپ فریز شده */
                gap: 20px; 
            }
            .section-card { padding: 18px 15px; }
            .content { padding: 30px 15px; }
        }
    </style>
</head>
<body>
    <!-- مودال پاپ‌آپ رمز پروفایل‌ها -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">رمز پروفایل</h2>
            <input type="password" id="modal-password" placeholder="رمز عبور را وارد کنید" autocomplete="off">
            <div>
                <button id="modal-submit">✅ تایید</button>
                <button class="cancel" id="modal-cancel">❌ انصراف</button>
            </div>
            <div id="modal-error" class="modal-error"></div>
        </div>
    </div>

    <!-- مودال اختصاصی تایید حذف و نوتیفیکیشن‌ها بجای alert و confirm پیش‌فرض مرورگر -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content" style="border-color: #e74c3c; max-width: 350px;">
            <h2 style="color: #e74c3c; font-size: 1.5rem;">⚠️ تایید عملیات</h2>
            <p id="confirm-msg" style="margin-bottom: 20px; line-height: 1.6;">آیا از حذف این آیتم مطمئن هستید؟</p>
            <div>

        // المان‌های DOM

        // تابع کمکی برای تایید حذف‌های شیک و غیربلاک‌کننده

        }

        };

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            page.classList.add('active');
            sessionStorage.setItem('currentPage', page.id);

            page.scrollTop = 0;

        function goToMainPage() {
            showPage(mainPage);

        }

        // محاسبه دقیق زمان گذشته
        function getTimeDifference() {
            const now = new Date();
            const diffMs = now - START_DATE;
            if (diffMs < 0) return { days: 0, hours: 0, minutes: 0, seconds: 0 };
            const seconds = Math.floor(diffMs / 1000);
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return { days, hours, minutes, seconds: secs };
        }

        function updatePublicPage() {
            const { days, hours, minutes, seconds } = getTimeDifference();
            timerDays.textContent = days;
            timerHours.textContent = hours;
            timerMinutes.textContent = minutes;
            timerSeconds.textContent = seconds;

            reasonsContainer.innerHTML = '';
            // نمایش دلایل بر اساس تعداد روز گذشته
            for (let i = 0; i < Math.min(days, reasonsList.length); i++) {
                const div = document.createElement('div');
                div.className = 'reason-item';
                div.innerText = `${i + 1}. ${reasonsList[i]}`;
                reasonsContainer.appendChild(div);
            }
            if (days === 0) {
                reasonsContainer.innerHTML = '<div class="reason-item">هنوز روزی نگذشته عزیزم. به ازای هر روزی که بگذره یه دلیل جدید اینجا میبینی پس از فردا به اینجا سر بزن. خیلی دوستت دارم💜</div>';
            } else if (days > reasonsList.length) {
                const extra = document.createElement('div');
                extra.className = 'reason-item';
                extra.style.borderColor = '#f1c40f';
                extra.innerText = '... و بی نهایت دلیل دیگه وجود داره که با تک تک ضربان قلبم بهشون پایبندم ✨';
                reasonsContainer.appendChild(extra);
            }
        }

        // اصلاح و ایمن‌سازی دیتابیس لوکال
        function getProfileData(profile, section) {
            // تفکیک دقیق داده‌های گلوبال/مشترک و داده‌های اختصاصی پروفایل
            if (['chat', 'letters', 'dreams', 'memories'].includes(section)) {
                const data = localStorage.getItem(`global_${section}`);
                return data ? JSON.parse(data) : [];
            }
            const key = `${profile}_${section}`;
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        }

        function saveProfileData(profile, section, data) {
            if (['chat', 'letters', 'dreams', 'memories'].includes(section)) {
                localStorage.setItem(`global_${section}`, JSON.stringify(data));
            } else {
                const key = `${profile}_${section}`;
                localStorage.setItem(key, JSON.stringify(data));
            }
        }

        // ساختار کارت‌های پروفایل
        const profileSections = [
            { id: 'info', title: '📋 بیوگرافی و اطلاعات من', type: 'info', hasReason: false, addType: 'info' },
            { id: 'pics', title: '📸 عکس‌ها و فیلم‌های مورد علاقه', type: 'media', hasReason: true, accept: 'image/*,video/*', addType: 'file' },
            { id: 'movies', title: '🎬 فیلم‌ها و سریال‌های پیشنهادی', type: 'movie', hasReason: true, addType: 'movie' },
            { id: 'songs', title: '🎵 آهنگ‌های پیشنهادی و خاص', type: 'song', hasReason: true, addType: 'song' },
            { id: 'places', title: '📍 جاهایی که باید بریم', type: 'place', hasReason: true, addType: 'location' },
            { id: 'notes', title: '📝 یادداشت‌های شخصی من', type: 'text', hasReason: false, addType: 'text' },
            { id: 'other', title: '🎨 علاقه‌مندی‌ها و متفرقه‌ها', type: 'media', hasReason: true, accept: '*/*', addType: 'file' },
            { id: 'games', title: '🎮 بازی‌هایی که دوست دارم باهم تجربه کنیم', type: 'game', hasReason: false, addType: 'game' },
            { id: 'letters', title: '💌 نامه‌ها و ناگفته‌های عاشقانه', type: 'sharedText', hasReason: false, addType: 'text' },
            { id: 'dreams', title: '✨ رویاهای مشترک و آرزوها', type: 'sharedText', hasReason: false, addType: 'text' },
            { id: 'memories', title: '📖 دفترچه خاطرات ما', type: 'memory', hasReason: true, addType: 'memory' },
            { id: 'chat', title: '💬 صندوق پیام‌های سریع ما', type: 'chat', hasReason: false }
        ];
        
        // اصلاح باگ‌های کلیدی رندر آیتم‌ها
        function renderItems(profile, section, items, container) {
            container.innerHTML = '';
            if (items.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.6; font-size:0.9rem; padding: 20px 0;">آیتمی اضافه نشده است</div>';
                return;
            }

            items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item-card';

                if (section.type === 'info') {
                    let html = '';
                    if (item.profilePic) {
                        html += `<img src="${item.profilePic}" class="info-card-pic">`;
                    }
                    if (item.name) html += `<div><strong>✨ نام و نام خانوادگی:</strong> ${item.name}</div>`;
                    if (item.birth) html += `<div><strong>📅 تاریخ تولد:</strong> ${item.birth}</div>`;
                    if (item.birthPlace) html += `<div><strong>🌍 محل تولد:</strong> ${item.birthPlace}</div>`;
                    if (item.livingPlace) html += `<div><strong>🏡 محل سکونت فعلی:</strong> ${item.livingPlace}</div>`;
                    if (item.favoriteFood) html += `<div><strong>🍕 خوراکی مورد علاقه:</strong> ${item.favoriteFood}</div>`;
                    if (item.favoriteSport) html += `<div><strong>⚽ ورزش مورد علاقه:</strong> ${item.favoriteSport}</div>`;
                    if (item.favoriteColor) html += `<div><strong>🎨 رنگ مورد علاقه:</strong> ${item.favoriteColor}</div>`;
                    if (item.favoriteMovie) html += `<div><strong>🎬 فیلم مورد علاقه:</strong> ${item.favoriteMovie}</div>`;
                    if (item.favoriteMusic) html += `<div><strong>🎵 موزیک مورد علاقه:</strong> ${item.favoriteMusic}</div>`;
                    if (item.favoriteBook) html += `<div><strong>📚 کتاب مورد علاقه:</strong> ${item.favoriteBook}</div>`;
                    if (item.favoriteAnimal) html += `<div><strong>🐱 حیوان مورد علاقه:</strong> ${item.favoriteAnimal}</div>`;
                    if (item.favoriteSeason) html += `<div><strong>🍁 فصل مورد علاقه:</strong> ${item.favoriteSeason}</div>`;
                    if (item.favoriteFlower) html += `<div><strong>🌹 گل مورد علاقه:</strong> ${item.favoriteFlower}</div>`;
                    if (item.favoriteEntertainment) html += `<div><strong>🎯 تفریح مورد علاقه:</strong> ${item.favoriteEntertainment}</div>`;
                    if (item.extra) html += `<div class="item-reason" style="margin-top: 10px;"><strong>💡 حرف دل:</strong> ${item.extra}</div>`;
                    itemDiv.innerHTML = html;
                } else if (section.type === 'text') {
                    itemDiv.innerHTML = `<div>${item.content}</div>`;
                } else if (section.type === 'media') {
                    if (item.type === 'image') {
                        itemDiv.innerHTML = `<img src="${item.content}">`;
                    } else if (item.type === 'video') {
                        itemDiv.innerHTML = `<video controls><source src="${item.content}" type="video/mp4"></video>`;
                    } else {
                        itemDiv.innerHTML = `<div style="word-break: break-all;"><a href="${item.content}" target="_blank" style="color:#f1c40f;">🔗 مشاهده و دانلود فایل</a></div>`;
                    }
                } else if (section.type === 'movie' || section.type === 'song') {
                    let html = `<div><strong>🎬 ${item.name}</strong></div>`;
                    if (item.link) html += `<div><a href="${item.link}" target="_blank" style="color:#3498db; font-weight:bold;">🔗 دانلود / پخش آنلاین</a></div>`;
                    if (item.reason) html += `<div class="item-reason">💬 ${item.reason}</div>`;
                    if (item.poster && section.type === 'movie') {
                        html += `<img src="${item.poster}">`;
                    }
                    itemDiv.innerHTML = html;
                } else if (section.type === 'place') {
                    let html = `<div><strong>📍 ${item.location || 'مکان ثبت نشده'}</strong></div>`;
                    if (item.content) html += `<img src="${item.content}">`;
                    if (item.reason) html += `<div class="item-reason">💬 ${item.reason}</div>`;
                    itemDiv.innerHTML = html;
                } else if (section.type === 'game') {
                    itemDiv.innerHTML = `<div class="game-item"><strong>🎮 ${item.name}</strong><br><a href="${item.link}" target="_blank">📥 لینک دریافت بازی</a></div>`;
                } else if (section.type === 'memory') {
                    let html = `<div><strong>📅 ${item.date || 'خاطره رویایی'}</strong></div>`;

                    itemDiv.innerHTML = html;

                if (item.reason && section.hasReason && !['movie', 'song', 'place', 'info'].includes(section.type)) {
                    itemDiv.innerHTML += `<div class="item-reason">💬 ${item.reason}</div>`;
                }

                // دکمه حذف
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '🗑️';
                delBtn.onclick = () => {
                    customConfirm('آیا از حذف دائمی این مورد اطمینان داری؟', () => {
                        items.splice(index, 1);
                        saveProfileData(profile, section.id, items);
                        renderItems(profile, section, items, container);
                    });
                };
                itemDiv.appendChild(delBtn);
                container.appendChild(itemDiv);
            });
        }

        // رفع باگ و تصحیح متغیرهای جابجا شده در این تابع
        function renderSharedItems(profile, section, items, container) {
            container.innerHTML = '';
            if (items.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.6; font-size:0.9rem; padding: 20px 0;">هنوز متنی نوشته نشده است</div>';
                return;
            }

            items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                const isOwn = (profile === 'mehran' && item.sender === 'مهران') || (profile === 'melorin' && item.sender === 'ملورین');
                itemDiv.className = `chat-message ${isOwn ? 'own' : ''}`;
                itemDiv.innerHTML = `
                    <div class="chat-sender">${item.sender}</div>
                    <div style="line-height:1.5;">${item.content}</div>
                    <button class="chat-delete" onclick="deleteSharedItem('${profile}', '${section.id}', ${index})">🗑️</button>

                container.appendChild(itemDiv);
            });
            // اسکرول به پایین‌ترین بخش به طور خودکار
            container.scrollTop = container.scrollHeight;
        }

        window.deleteSharedItem = function(profile, sectionId, index) {
            customConfirm('آیا می‌خواهی این یادداشت/نامه را حذف کنی؟', () => {
                const items = getProfileData(profile, sectionId);
                items.splice(index, 1);
                saveProfileData(profile, sectionId, items);
                const container = document.getElementById(`${profile}_${sectionId}_items`);
                const section = profileSections.find(s => s.id === sectionId);
                renderSharedItems(profile, section, items, container);
            });
        };

                    <input type="text" id="${profile}_${section.id}_favoriteSeason" placeholder="فصل مورد علاقه">
                    <input type="text" id="${profile}_${section.id}_favoriteFlower" placeholder="گل مورد علاقه">
                    <input type="text" id="${profile}_${section.id}_favoriteEntertainment" placeholder="تفریح و سرگرمی‌های محبوب">
                    <textarea id="${profile}_${section.id}_extra" placeholder="✨ هر چیز دیگه ای که دوست داری بگی..."></textarea>
                    <button onclick="addInfoItem('${profile}', '${section.id}')">💾 ذخیره مشخصات</button>
                    <button class="cancel" onclick="document.getElementById('${formId}').classList.remove('active')">❌ انصراف</button>
                `;
            } else if (section.addType === 'text') {
                html = `
                    <textarea id="${profile}_${section.id}_text" placeholder="حس قشنگت رو اینجا بنویس..." rows="4"></textarea>
                    <button onclick="addTextItem('${profile}', '${section.id}')">💾 ذخیره یادداشت</button>
                    <button class="cancel" onclick="document.getElementById('${formId}').classList.remove('active')">❌ انصراف</button>
                `;
            } else if (section.addType === 'file') {
                html = `
                    <label>📁 انتخاب فایل (تصویر یا فیلم):</label>
                    <input type="file" id="${profile}_${section.id}_file" accept="${section.accept}">
                    <input type="text" id="${profile}_${section.id}_reason" placeholder="💬 چرا اینو دوست داری؟">
                    <button onclick="addFileItem('${profile}', '${section.id}')">📤 آپلود رسانه</button>
                    <button class="cancel" onclick="document.getElementById('${formId}').classList.remove('active')">❌ انصراف</button>
                `;
            } else if (section.addType === 'location') {
                html = `
                    <input type="text" id="${profile}_${section.id}_location" placeholder="کجا دوست داری بریم؟ (مثلا شیراز)">
                    <label>📸 عکس از اونجا (اختیاری):</label>
                    <input type="file" id="${profile}_${section.id}_file" accept="image/*">
                    <input type="text" id="${profile}_${section.id}_reason" placeholder="💬 دلیلت رو بنویس">
                    <button onclick="addLocationItem('${profile}', '${section.id}')">💾 ثبت مکان رویایی</button>
                    <button class="cancel" onclick="document.getElementById('${formId}').classList.remove('active')">❌ انصراف</button>
                `;
            } else if (section.addType === 'game') {
                html = `
                    <input type="text" id="${profile}_${section.id}_name" placeholder="نام بازی">
                    <input type="url" id="${profile}_${section.id}_link" placeholder="لینک دانلود بازی">
                    <button onclick="addGameItem('${profile}', '${section.id}')">💾 ثبت بازی</button>
                    <button class="cancel" onclick="document.getElementById('${formId}').classList.remove('active')">❌ انصراف</button>
                `;
            } else if (section.addType === 'movie' || section.addType === 'song') {
                html = `
                    <input type="text" id="${profile}_${section.id}_name" placeholder="نام فیلم / موزیک">
                    <input type="url" id="${profile}_${section.id}_link" placeholder="لینک دانلود / پخش آنلاین (اختیاری)">
                    <input type="text" id="${profile}_${section.id}_reason" placeholder="💬 چرا پیشنهادش می‌کنی؟">
                    ${section.addType === 'movie' ? `<label>🖼️ پوستر فیلم (اختیاری):</label><input type="file" id="${profile}_${section.id}_poster" accept="image/*">` : ''}
                    <button onclick="addMovieSongItem('${profile}', '${section.id}')">💾 ثبت نهایی</button>
                    <button class="cancel" onclick="document.getElementById('${formId}').classList.remove('active')">❌ انصراف</button>
                `;
            } else if (section.addType === 'memory') {
                html = `
                    <label>📅 تاریخ ثبت خاطره:</label>
                    <input type="date" id="${profile}_${section.id}_date">
                    <textarea id="${profile}_${section.id}_text" placeholder="شرح این خاطره زیبا و فراموش‌نشدنی..." rows="4"></textarea>
                    <label>📸 عکس یادگاری از این خاطره (اختیاری):</label>
                    <input type="file" id="${profile}_${section.id}_file" accept="image/*">
                    <button onclick="addMemoryItem('${profile}', '${section.id}')">💾 ثبت در دفتر خاطرات</button>
                    <button class="cancel" onclick="document.getElementById('${formId}').classList.remove('active')">❌ انصراف</button>
                `;
            }
            formDiv.innerHTML = html;
        }

        // سیستم هوشمند هندل کردن فایل‌های با حجم بالا و اطلاعات
        window.addInfoItem = function(profile, sectionId) {
            const profilePicInput = document.getElementById(`${profile}_${sectionId}_profilePic`);
            const name = document.getElementById(`${profile}_${sectionId}_name`).value.trim();
            const birth = document.getElementById(`${profile}_${sectionId}_birth`).value.trim();
            const birthPlace = document.getElementById(`${profile}_${sectionId}_birthPlace`).value.trim();
            const livingPlace = document.getElementById(`${profile}_${sectionId}_livingPlace`).value.trim();
            const favoriteFood = document.getElementById(`${profile}_${sectionId}_favoriteFood`).value.trim();
            const favoriteSport = document.getElementById(`${profile}_${sectionId}_favoriteSport`).value.trim();
            const favoriteColor = document.getElementById(`${profile}_${sectionId}_favoriteColor`).value.trim();
            const favoriteMovie = document.getElementById(`${profile}_${sectionId}_favoriteMovie`).value.trim();
            const favoriteMusic = document.getElementById(`${profile}_${sectionId}_favoriteMusic`).value.trim();
            const favoriteBook = document.getElementById(`${profile}_${sectionId}_favoriteBook`).value.trim();
            const favoriteAnimal = document.getElementById(`${profile}_${sectionId}_favoriteAnimal`).value.trim();
            const favoriteSeason = document.getElementById(`${profile}_${sectionId}_favoriteSeason`).value.trim();
            const favoriteFlower = document.getElementById(`${profile}_${sectionId}_favoriteFlower`).value.trim();
            const favoriteEntertainment = document.getElementById(`${profile}_${sectionId}_favoriteEntertainment`).value.trim();
            const extra = document.getElementById(`${profile}_${sectionId}_extra`).value.trim();

            const items = getProfileData(profile, sectionId);

            const saveProcess = (imgData = null) => {
                items.push({
                    profilePic: imgData,
                    name, birth, birthPlace, livingPlace, favoriteFood, favoriteSport,
                    favoriteColor, favoriteMovie, favoriteMusic, favoriteBook,
                    favoriteAnimal, favoriteSeason, favoriteFlower, favoriteEntertainment, extra
                });
                saveProfileData(profile, sectionId, items);
                const container = document.getElementById(`${profile}_${sectionId}_items`);
                const section = profileSections.find(s => s.id === sectionId);
                renderItems(profile, section, items, container);
                document.getElementById(`${profile}_${sectionId}_form`).classList.remove('active');
            };

            if (profilePicInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveProcess(e.target.result);
                };
                reader.readAsDataURL(profilePicInput.files[0]);
            } else {
                saveProcess();
            }
        };

        window.addTextItem = function(profile, sectionId) {
            const text = document.getElementById(`${profile}_${sectionId}_text`).value.trim();
            if (!text) return;
            const items = getProfileData(profile, sectionId);
            const section = profileSections.find(s => s.id === sectionId);
            
            if (section.type === 'sharedText') {
                const sender = (profile === 'mehran') ? 'مهران' : 'ملورین';
                items.push({ sender: sender, content: text });
            } else {
                items.push({ content: text });
            }
            
            saveProfileData(profile, sectionId, items);
            const container = document.getElementById(`${profile}_${sectionId}_items`);
            if (section.type === 'sharedText') {
                renderSharedItems(profile, section, items, container);
            } else {
                renderItems(profile, section, items, container);
            }
            document.getElementById(`${profile}_${sectionId}_form`).classList.remove('active');
        };

        window.addFileItem = function(profile, sectionId) {
            const fileInput = document.getElementById(`${profile}_${sectionId}_file`);
            const reason = document.getElementById(`${profile}_${sectionId}_reason`).value.trim();
            if (!fileInput.files[0]) return;
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const items = getProfileData(profile, sectionId);
                let type = 'file';
                if (file.type.startsWith('image/')) type = 'image';
                else if (file.type.startsWith('video/')) type = 'video';
                items.push({ content: e.target.result, reason: reason, type: type });
                saveProfileData(profile, sectionId, items);
                const container = document.getElementById(`${profile}_${sectionId}_items`);
                const section = profileSections.find(s => s.id === sectionId);
                renderItems(profile, section, items, container);
                document.getElementById(`${profile}_${sectionId}_form`).classList.remove('active');
            };
            reader.readAsDataURL(file);
        };

        window.addLocationItem = function(profile, sectionId) {
            const location = document.getElementById(`${profile}_${sectionId}_location`).value.trim();
            const fileInput = document.getElementById(`${profile}_${sectionId}_file`);
            const reason = document.getElementById(`${profile}_${sectionId}_reason`).value.trim();
            const items = getProfileData(profile, sectionId);

            const saveProcess = (imgData = null) => {
                items.push({ location: location, content: imgData, reason: reason });
                saveProfileData(profile, sectionId, items);
                const container = document.getElementById(`${profile}_${sectionId}_items`);
                const section = profileSections.find(s => s.id === sectionId);
                renderItems(profile, section, items, container);
                document.getElementById(`${profile}_${sectionId}_form`).classList.remove('active');
            };

            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveProcess(e.target.result);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveProcess();
            }
        };

        window.addGameItem = function(profile, sectionId) {
            const name = document.getElementById(`${profile}_${sectionId}_name`).value.trim();
            const link = document.getElementById(`${profile}_${sectionId}_link`).value.trim();
            if (!name || !link) return;
            const items = getProfileData(profile, sectionId);
            items.push({ name: name, link: link });
            saveProfileData(profile, sectionId, items);
            const container = document.getElementById(`${profile}_${sectionId}_items`);
            const section = profileSections.find(s => s.id === sectionId);
            renderItems(profile, section, items, container);
            document.getElementById(`${profile}_${sectionId}_form`).classList.remove('active');
        };

        window.addMovieSongItem = function(profile, sectionId) {
            const name = document.getElementById(`${profile}_${sectionId}_name`).value.trim();
            const link = document.getElementById(`${profile}_${sectionId}_link`).value.trim();
            const reason = document.getElementById(`${profile}_${sectionId}_reason`).value.trim();
            const posterInput = document.getElementById(`${profile}_${sectionId}_poster`);
            if (!name) return;
            const items = getProfileData(profile, sectionId);

            const saveProcess = (imgData = null) => {
                items.push({ name: name, link: link, reason: reason, poster: imgData });
                saveProfileData(profile, sectionId, items);
                const container = document.getElementById(`${profile}_${sectionId}_items`);
                const section = profileSections.find(s => s.id === sectionId);
                renderItems(profile, section, items, container);
                document.getElementById(`${profile}_${sectionId}_form`).classList.remove('active');
            };

            if (posterInput && posterInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveProcess(e.target.result);
                };
                reader.readAsDataURL(posterInput.files[0]);
            } else {
                saveProcess();
            }
        };

        window.addMemoryItem = function(profile, sectionId) {
            const date = document.getElementById(`${profile}_${sectionId}_date`).value;
            const text = document.getElementById(`${profile}_${sectionId}_text`).value.trim();
            const fileInput = document.getElementById(`${profile}_${sectionId}_file`);
            if (!text) return;
            const items = getProfileData(profile, sectionId);

            const saveProcess = (imgData = null) => {
                items.push({ date: date, content: text, image: imgData });
                saveProfileData(profile, sectionId, items);
                const container = document.getElementById(`${profile}_${sectionId}_items`);
                const section = profileSections.find(s => s.id === sectionId);
                renderItems(profile, section, items, container);
                document.getElementById(`${profile}_${sectionId}_form`).classList.remove('active');
            };

            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveProcess(e.target.result);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveProcess();
            }
        };

        window.sendChatMessage = function(profile) {
            const input = document.getElementById(`${profile}_chat_input`);
            const text = input.value.trim();
            if (!text) return;
            const messages = getProfileData(profile, 'chat');
            const sender = (profile === 'mehran') ? 'مهران' : 'ملورین';
            messages.push({ sender: sender, content: text });
            saveProfileData(profile, 'chat', messages);
            const container = document.getElementById(`${profile}_chat_items`);
            renderChatMessages(profile, messages, container);
            input.value = '';
        };

        // رفع باگ متغیر جابجا شده (msg/item) در رندر چت‌ها
        function renderChatMessages(profile, messages, container) {
            container.innerHTML = '';
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.6; font-size:0.9rem; padding: 20px 0;">گفتگو را شروع کنید</div>';
                return;
            }

            messages.forEach((msg, index) => {
                const div = document.createElement('div');
                const isOwn = (profile === 'mehran' && msg.sender === 'مهران') || (profile === 'melorin' && msg.sender === 'ملورین');
                div.className = `chat-message ${isOwn ? 'own' : ''}`;
                div.innerHTML = `
                    <div class="chat-sender">${msg.sender}</div>
                    <div style="line-height:1.5;">${msg.content}</div>
                    <button class="chat-delete" onclick="deleteChatMessage('${profile}', ${index})">🗑️</button>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        window.deleteChatMessage = function(profile, index) {
            customConfirm('آیا می‌خواهی این پیام چت را حذف کنی؟', () => {
                const messages = getProfileData(profile, 'chat');
                messages.splice(index, 1);
                saveProfileData(profile, 'chat', messages);
                const container = document.getElementById(`${profile}_chat_items`);
                renderChatMessages(profile, messages, container);
            });
        };

        // رندر و لود کارت‌های پروفایل
		function renderProfile(profile) {
		    const containerId = profile === 'mehran' ? 'mehran-sections' : 'melorin-sections';
		    const container = document.getElementById(containerId);
		    container.innerHTML = '';
		
		    profileSections.forEach(section => {
		        const items = getProfileData(profile, section.id);
		        const card = document.createElement('div');
		        card.className = 'section-card';
		        card.innerHTML = `
		            <div>
		                <div class="section-title">${section.title}</div>
		                <div class="items-container" id="${profile}_${section.id}_items"></div>
		            </div>
		            <div id="${profile}_${section.id}_action_zone">
		                ${section.id !== 'chat' ? `<button class="add-btn" onclick="showAddForm('${profile}', ${JSON.stringify(section).replace(/"/g, '&quot;')})">➕ افزودن به این بخش</button>` : ''}
		                <div id="${profile}_${section.id}_form" class="add-form"></div>
		            </div>
		        `;
		        container.appendChild(card);
		
		        const itemsContainer = document.getElementById(`${profile}_${section.id}_items`);
		        if (section.id === 'chat') {
		            renderChatMessages(profile, items, itemsContainer);
		            
		            // ساخت باکس چت در زون اختصاصی دکمه‌ها برای تراز شدن دقیق
		            const actionZone = card.querySelector(`#${profile}_${section.id}_action_zone`);
		            const inputArea = document.createElement('div');
		            inputArea.className = 'chat-input-area';
		            inputArea.innerHTML = `
		                <input type="text" id="${profile}_chat_input" placeholder="✏️ پیامت را بنویس..." autocomplete="off">
		                <button onclick="sendChatMessage('${profile}')">ارسال</button>
		            `;
		            actionZone.appendChild(inputArea);
		            
		            // با زدن دکمه اینتر چت ارسال شود
		            const chatInput = document.getElementById(`${profile}_chat_input`);
		            chatInput.addEventListener('keypress', (e) => {
		                if (e.key === 'Enter') {
		                    sendChatMessage(profile);
		                }
		            });
		        } else if (section.type === 'sharedText') {
		            renderSharedItems(profile, section, items, itemsContainer);
		        } else {
		            renderItems(profile, section, items, itemsContainer);
		        }
		    });
		}

        // تغییر رمز عبور به صورت کاملا ایمن
        window.changePassword = function(profile) {
            const newPass = prompt('رمز عبور جدید را وارد کنید:');
            if (newPass && newPass.trim() !== '') {
                if (profile === 'mehran') {
                    MEHRAN_PASSWORD = newPass.trim();
                    localStorage.setItem('mehran_password', MEHRAN_PASSWORD);
                } else {
                    MELORIN_PASSWORD = newPass.trim();
                    localStorage.setItem('melorin_password', MELORIN_PASSWORD);
                }
                alert('✅ رمز عبور با موفقیت تغییر یافت.');
            }
        };

        // دکمه ورود صفحه اول
        submitBtn.addEventListener('click', function() {
            const entered = passwordInput.value.trim();
            if (entered === MAIN_PASSWORD) {
                showPage(mainPage);
                errorDiv.textContent = '';
                sessionStorage.setItem('loggedIn', 'true');
            } else {
                errorDiv.textContent = '❌ رمز عبور اشتباه است، عزیزم پی‌وی بپرس';
                passwordInput.value = '';
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitBtn.click();
        });

        // کلیک روی باکس‌های صفحه اصلی
        document.querySelectorAll('.box').forEach(box => {
            box.addEventListener('click', function() {
                const profile = this.dataset.profile;
                if (profile === 'public') {
                    updatePublicPage();
                    showPage(publicPage);
                } else {
                    pendingProfile = profile;
                    modalTitle.innerText = (profile === 'mehran') ? 'ورود به پروفایل مهران' : 'ورود به پروفایل ملورین';
                    modalPassword.value = '';
                    modalError.textContent = '';
                    modal.classList.add('active');
                    setTimeout(() => modalPassword.focus(), 150);
                }
            });
        });

        // سابمیت کردن پاپ‌آپ تایید رمز عبور اختصاصی
        modalSubmit.addEventListener('click', function() {
            const entered = modalPassword.value.trim();
            const correct = (pendingProfile === 'mehran' && entered === MEHRAN_PASSWORD) ||
                            (pendingProfile === 'melorin' && entered === MELORIN_PASSWORD);
            if (correct) {
                modal.classList.remove('active');
                renderProfile(pendingProfile);
                if (pendingProfile === 'mehran') showPage(mehranPage);
                else showPage(melorinPage);
                sessionStorage.setItem('activeProfile', pendingProfile);
                pendingProfile = null;
            } else {
                modalError.textContent = '❌ رمز نادرسته عزیزم، یادت نمیاد بپرس';
            }
        });

        modalPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') modalSubmit.click();
        });

        modalCancel.addEventListener('click', () => {
            modal.classList.remove('active');
            pendingProfile = null;
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                pendingProfile = null;
            }
        });

        // مدیریت لود وضعیت مرورگر و بازسازی امن آخرین صفحه
        window.addEventListener('load', function() {
            const loggedIn = sessionStorage.getItem('loggedIn');
            const activeProfile = sessionStorage.getItem('activeProfile');
            const lastPage = sessionStorage.getItem('currentPage');
            
            if (loggedIn === 'true') {
                if (activeProfile === 'mehran') {
                    renderProfile('mehran');
                    showPage(mehranPage);
                } else if (activeProfile === 'melorin') {
                    renderProfile('melorin');
                    showPage(melorinPage);
                } else if (lastPage === 'public-page') {
                    updatePublicPage();
                    showPage(publicPage);
                } else {
                    showPage(mainPage);
                }
            } else {
                showPage(loginPage);
                passwordInput.focus();
            }
        });

        // آپدیت ثانیه‌ای تایمر
        setInterval(() => {
            if (publicPage.classList.contains('active')) {
                updatePublicPage();
            }
        }, 1000);
    </script>
</body>
</html>
